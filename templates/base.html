<!DOCTYPE html>
<html lang="en">
<head>
    <title>MzansiBuilds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0f172a;
            color:white;
            margin:0;
        }

        nav{
            background:#020617;
            padding:15px;
            display:flex;
            justify-content:space-between;
        }

        nav a{
            color:#38bdf8;
            text-decoration:none;
            margin-right:15px;
            font-weight:bold;
        }

        .container{
            width:80%;
            margin:auto;
            margin-top:40px;
        }

        button{
            background:#38bdf8;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:6px;
            border:none;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<nav>
    <div>
        <a href="/">MzansiBuilds</a>
    </div>

    <div>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
